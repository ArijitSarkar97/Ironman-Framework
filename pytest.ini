[pytest]
addopts = --alluredir=./allure-results --clean-alluredir --log-cli-level=INFO --reruns 2 --reruns-delay 1
log_cli = true
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S
python_files = test_*.py

markers=
    suraj:run suraj tests